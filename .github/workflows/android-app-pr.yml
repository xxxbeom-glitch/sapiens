# app 모듈 변경 시 컴파일 + Lint로 반복 오류(미스 권한, 머지 충돌 등) 조기 차단
name: Android app verify

on:
  pull_request:
    paths:
      - "app/**"
      - "gradle/**"
      - "gradle.properties"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/libs.versions.toml"
      - "tools/google-services.ci.json"
      - ".github/workflows/android-app-pr.yml"
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "gradle/**"
      - "gradle.properties"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/libs.versions.toml"
      - "tools/google-services.ci.json"
      - ".github/workflows/android-app-pr.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: CI용 google-services (실제 키 아님, 빌드 통과용)
        run: cp tools/google-services.ci.json app/google-services.json

      - name: Gradle wrapper
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: App verify (compile + lint)
        run: ./gradlew :app:verifyApp --no-daemon --stacktrace
