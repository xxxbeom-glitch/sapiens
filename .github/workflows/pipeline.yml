name: Sapiens Pipeline

# ━ 스케줄(UTC): KST 20분 전 작업 → 정각 푸시(PUSH_KST_HOUR는 워크플로에서 고정).
# ━ 수동 실행: section(all|news|market)만 선택. 푸시 예약 시각은 파이썬이「다음 KST 정각」으로 둠(입력칸 없음).
'on':
  schedule:
    - cron: "40 22 * * *"  # 07:40 KST 뉴스
    - cron: "40 1 * * *"   # 10:40 KST 뉴스
    - cron: "40 5 * * *"   # 14:40 KST 뉴스
    - cron: "40 7 * * *"   # 16:40 KST 뉴스+마켓
    - cron: "40 23 * * *"  # 08:40 KST 마켓(전용)
  workflow_dispatch:
    inputs:
      section:
        description: "all = 뉴스+마켓, news = 뉴스만, market = 마켓만"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - news
          - market

permissions:
  contents: read

jobs:
  news_07_40_kst:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '40 22 * * *'
    env:
      PIPELINE_SECTION: news
      PUSH_KST_HOUR: "8"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run pipeline
        working-directory: pipeline
        env:
          PIPELINE_SECTION: ${{ env.PIPELINE_SECTION }}
          PUSH_KST_HOUR: ${{ env.PUSH_KST_HOUR }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAPIENS_ARTICLE_LLM_JUDGE: "1"
        run: python main.py

  news_10_40_kst:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '40 1 * * *'
    env:
      PIPELINE_SECTION: news
