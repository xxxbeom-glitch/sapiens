          PUSH_KST_HOUR: ${{ env.PUSH_KST_HOUR }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAPIENS_ARTICLE_LLM_JUDGE: "1"
        run: python main.py

  market_08_40_kst:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '40 23 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.section == 'market' && (github.event.inputs.push_kst_hour == '9' || github.event.inputs.push_kst_hour == ''))
    env:
      PIPELINE_SECTION: market
      PUSH_KST_HOUR: "9"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run pipeline
        working-directory: pipeline
        env:
          PIPELINE_SECTION: ${{ env.PIPELINE_SECTION }}
          PUSH_KST_HOUR: ${{ env.PUSH_KST_HOUR }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAPIENS_ARTICLE_LLM_JUDGE: "1"
        run: python main.py
