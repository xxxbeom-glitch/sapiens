name: Sapiens Pipeline

# ━ 스케줄(UTC): KST 30분 전 작업 → 정각 푸시
# ━ 06:30 KST (21:30 UTC 전날) → 07:00 KST 푸시
# ━ 17:30 KST (08:30 UTC)      → 18:00 KST 푸시
# ━ 수동 실행: workflow_dispatch
'on':
  schedule:
    - cron: "30 21 * * *"  # 06:30 KST (미국 장 마감 후)
    - cron: "30 8 * * *"   # 17:30 KST (국내 장 마감 후)
  workflow_dispatch:
    inputs:
      section:
        description: "news(기본), all"
        required: false
        default: "news"
        type: choice
        options:
          - news
          - all

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"

jobs:
  # ── 오전 브리핑: 06:30 KST 작업 → 07:00 KST 푸시 ─────────
  morning_06_30_kst:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '30 21 * * *'
    env:
      PIPELINE_SECTION: news
      PUSH_KST_HOUR: "7"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
      - name: Run pipeline
        working-directory: pipeline
        env:
          PIPELINE_SECTION: ${{ env.PIPELINE_SECTION }}
          PUSH_KST_HOUR: ${{ env.PUSH_KST_HOUR }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "파이프라인 시작 PIPELINE_SECTION=$PIPELINE_SECTION PUSH_KST_HOUR=$PUSH_KST_HOUR"
          python -u main.py

  # ── 저녁 브리핑: 17:30 KST 작업 → 18:00 KST 푸시 ─────────
  evening_17_30_kst:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '30 8 * * *'
    env:
      PIPELINE_SECTION: news
      PUSH_KST_HOUR: "18"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
      - name: Run pipeline
        working-directory: pipeline
        env:
          PIPELINE_SECTION: ${{ env.PIPELINE_SECTION }}
          PUSH_KST_HOUR: ${{ env.PUSH_KST_HOUR }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "파이프라인 시작 PIPELINE_SECTION=$PIPELINE_SECTION PUSH_KST_HOUR=$PUSH_KST_HOUR"
          python -u main.py

  # ── 수동 실행 ───────────────────────────────────────────────
  manual:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
      - name: Run pipeline
        working-directory: pipeline
        env:
          PIPELINE_SECTION: ${{ github.event.inputs.section }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "파이프라인 시작 PIPELINE_SECTION=$PIPELINE_SECTION"
          python -u main.py
