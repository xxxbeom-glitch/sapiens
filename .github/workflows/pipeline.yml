name: Sapiens Pipeline

# ━ CI 시각(UTC) → KST(UTC+9) 20분 전 = 작업 시작, 정각 = 푸시( push_schedule, PUSH_KST_HOUR )
#    뉴스 8·11·15·17 / 마켓 9·17  (뉴스는 월~일, 마켓은 main에서 월~금+공휴일 제외)
'on':
  schedule:
    - cron: "40 22 * * *"  # 07:40 KST 뉴스
    - cron: "40 1 * * *"   # 10:40 KST 뉴스
    - cron: "40 5 * * *"   # 14:40 KST 뉴스
    - cron: "40 7 * * *"   # 16:40 KST 뉴스+마켓
    - cron: "40 23 * * *"  # 08:40 KST 마켓(전용)
  workflow_dispatch:
    inputs:
      section:
        description: "all | news | market"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - news
          - market
      push_kst_hour:
        description: "수동 실행 시 푸시 정각(KST). news: 8|11|15|17, market: 9, all(저녁): 17. 비어 있으면 section 기본"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  news_07_40_kst:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '40 22 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.section == 'news' && (github.event.inputs.push_kst_hour == '8' || github.event.inputs.push_kst_hour == ''))
    env:
      PIPELINE_SECTION: news
      PUSH_KST_HOUR: "8"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run pipeline
        working-directory: pipeline
        env:
          PIPELINE_SECTION: ${{ env.PIPELINE_SECTION }}
          PUSH_KST_HOUR: ${{ env.PUSH_KST_HOUR }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAPIENS_ARTICLE_LLM_JUDGE: "1"
        run: python main.py

  news_10_40_kst:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '40 1 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.section == 'news' && github.event.inputs.push_kst_hour == '11')
    env:
      PIPELINE_SECTION: news
      PUSH_KST_HOUR: "11"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run pipeline
        working-directory: pipeline
        env:
          PIPELINE_SECTION: ${{ env.PIPELINE_SECTION }}
          PUSH_KST_HOUR: ${{ env.PUSH_KST_HOUR }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAPIENS_ARTICLE_LLM_JUDGE: "1"
        run: python main.py

  news_14_40_kst:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '40 5 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.section == 'news' && github.event.inputs.push_kst_hour == '15')
    env:
      PIPELINE_SECTION: news
      PUSH_KST_HOUR: "15"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run pipeline
        working-directory: pipeline
        env:
          PIPELINE_SECTION: ${{ env.PIPELINE_SECTION }}
          PUSH_KST_HOUR: ${{ env.PUSH_KST_HOUR }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAPIENS_ARTICLE_LLM_JUDGE: "1"
        run: python main.py

  news_and_market_16_40_kst:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '40 7 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.section == 'all' && (github.event.inputs.push_kst_hour == '17' || github.event.inputs.push_kst_hour == ''))
    env:
      PIPELINE_SECTION: all
      PUSH_KST_HOUR: "17"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run pipeline
        working-directory: pipeline
        env:
