name: Sapiens Pipeline

'on':
  schedule:
    # briefing: KST 05:00 월~토 (UTC 기준 — 저장소 설정에 맞게 조정)
    - cron: "0 20 * * 1-6"
    # domestic_news: KST 07:30 / 10:30 / 16:30
    - cron: "30 22 * * 1-6"
    - cron: "30 1 * * 1-6"
    - cron: "30 7 * * 1-6"
    # overseas_news: KST 18:00
    - cron: "0 9 * * 1-6"
    # market: KST 09:30 / 16:30
    - cron: "30 0 * * 1-6"
  workflow_dispatch:
    inputs:
      section:
        description: "Pipeline section"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - briefing
          - domestic_news
          - overseas_news
          - market

permissions:
  contents: read

jobs:
  briefing:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 20 * * 1-6') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.section == 'briefing' || github.event.inputs.section == 'all'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        working-directory: pipeline
        env:
          PIPELINE_SECTION: briefing
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 기사 요약: Haiku 초안 → Gemini 검증 파이프라인 (끄려면 "0" 또는 env 줄 삭제)
          SAPIENS_ARTICLE_LLM_JUDGE: "1"
        run: python main.py

  domestic_news:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && (github.event.schedule == '30 22 * * 1-6' || github.event.schedule == '30 1 * * 1-6' || github.event.schedule == '30 7 * * 1-6')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.section == 'domestic_news' || github.event.inputs.section == 'all'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        working-directory: pipeline
        env:
          PIPELINE_SECTION: domestic_news
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAPIENS_ARTICLE_LLM_JUDGE: "1"
        run: python main.py

  overseas_news:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 9 * * 1-6') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.section == 'overseas_news' || github.event.inputs.section == 'all'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        working-directory: pipeline
        env:
          PIPELINE_SECTION: overseas_news
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAPIENS_ARTICLE_LLM_JUDGE: "1"
        run: python main.py

  market:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && (github.event.schedule == '30 0 * * 1-6' || github.event.schedule == '30 7 * * 1-6')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.section == 'market' || github.event.inputs.section == 'all'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        working-directory: pipeline
        env:
          PIPELINE_SECTION: market
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAPIENS_ARTICLE_LLM_JUDGE: "1"
        run: python main.py
